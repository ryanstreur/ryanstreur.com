{% extends 'base.html' %}
{% load markdownify %}

{% block main %}
<h1>
  {{ post.title }}
</h1>
<article>
  {{ post.content|markdownify }}
</article>
{% if request.user.is_staff %}
<div>
  <a href="{% url 'admin:blog_post_change' object_id=post.id %}">
    Edit post
  </a>
</div>
{% endif %}
{% endblock %}
